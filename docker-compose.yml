services:

  # ── MYSQL DATABASE ───────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: projectflow_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: projectflow
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - projectflow

  # ── REDIS CACHE ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: projectflow_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - projectflow

  # ── LARAVEL API ──────────────────────────────────────────────────
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: projectflow_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: projectflow
      DB_USERNAME: root
      DB_PASSWORD: rootsecret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: projectflow-app-id
      REVERB_APP_KEY: projectflow-key
      REVERB_APP_SECRET: projectflow-secret
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
    depends_on:
      - mysql
      - redis
    networks:
      - projectflow

  # ── REVERB WEBSOCKET SERVER ──────────────────────────────────────
  reverb:
    build:
      context: ./backend
      dockerfile: Dockerfile.reverb
    container_name: projectflow_reverb
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: projectflow
      DB_USERNAME: root
      DB_PASSWORD: rootsecret
      REDIS_HOST: redis
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: projectflow-app-id
      REVERB_APP_KEY: projectflow-key
      REVERB_APP_SECRET: projectflow-secret
      REVERB_HOST: 0.0.0.0
      REVERB_PORT: 8080
      REVERB_SCHEME: http
    depends_on:
      - mysql
      - redis
    networks:
      - projectflow

  # ── REACT FRONTEND ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: projectflow_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - app
    networks:
      - projectflow

volumes:
  mysql_data:

networks:
  projectflow:
    driver: bridge